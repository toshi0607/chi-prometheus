on:
  pull_request:
    paths:
      - '**.go'
      - '**.yml'
      - 'go.mod'
jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7
      - name: golangci-lint
        uses: reviewdog/action-golangci-lint@v2
